name: PR Test and Auto-Assign

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  test-and-assign:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        id: install-deps
        working-directory: app/vulnerable
        run: pip install -r requirements.txt
        continue-on-error: true

      - name: Run unit tests
        id: run-tests
        working-directory: app/vulnerable
        run: python -m unittest test_main.py -v
        continue-on-error: true

      - name: Assign reviewers based on test results
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const installSuccess = '${{ steps.install-deps.outcome }}' === 'success';
            const testsSuccess = '${{ steps.run-tests.outcome }}' === 'success';
            const allPassed = installSuccess && testsSuccess;
            const prNumber = context.payload.pull_request.number;
            
            if (allPassed) {
              // All steps passed - request review from Software Lead
              console.log('✅ All checks passed - requesting review from Software Lead');
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                reviewers: ['swe-lead']
              });
              
              // Add success comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: '✅ **All checks passed!** Dependencies installed successfully and unit tests passed. Requested review from @swe-lead for code review and approval.'
              });
            } else {
              // Something failed - assign to SWE for resolution
              let failureReason = '';
              if (!installSuccess) {
                failureReason = 'Dependency installation failed';
                console.log('❌ Dependency installation failed - assigning to SWE');
              } else if (!testsSuccess) {
                failureReason = 'Unit tests failed';
                console.log('❌ Unit tests failed - assigning to SWE');
              }
              
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                assignees: ['swe-user']
              });
              
              // Add failure comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `❌ **${failureReason}!** Assigned to @swe-user to resolve the issues. Please check the workflow logs for details.`
              });
            }

      - name: Set final status
        if: steps.install-deps.outcome == 'failure' || steps.run-tests.outcome == 'failure'
        run: exit 1