name: Trigger Concert Ingestion Job

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  trigger-ingestion:
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Concert Ingestion API
        env:
          CONCERT_API_KEY: ${{ secrets.CONCERT_API_KEY }}
          INSTANCE_ID: ${{ secrets.CONCERT_INSTANCE_ID || '0000-0000-0000-0000' }}
          CONCERT_URL: ${{ vars.CONCERT_HOSTNAME || 'https://162.133.134.251:12443' }}
          JOB_ID: 'fe01c3b1-afbf-472d-a99b-2e3b72c80253'
        run: |
          echo "Triggering Concert ingestion job..."
          echo "Job ID: ${JOB_ID}"
          
          RESPONSE=$(curl -k --request POST \
            --url ${CONCERT_URL}/ingestion/api/v1/job/v2/submit \
            --header "Authorization: ${CONCERT_API_KEY}" \
            --header "InstanceId: ${INSTANCE_ID}" \
            --header 'accept: application/json' \
            --header 'content-type: application/json' \
            --data "{\"job_details\":{\"job_id\":\"${JOB_ID}\",\"job_type\":\"source_control_discovery_job\"}}" \
            --write-out "\nHTTP_STATUS:%{http_code}" \
            --silent)
          
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d':' -f2)
          BODY=$(echo "$RESPONSE" | sed '/HTTP_STATUS:/d')
          
          echo "Response Status: $HTTP_STATUS"
          echo "Response Body: $BODY"
          
          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✅ Concert ingestion job submitted successfully"
            echo "Job ID: ${JOB_ID}"
          else
            echo "❌ Failed to submit Concert ingestion job"
            echo "Status Code: $HTTP_STATUS"
            echo "Response: $BODY"
            exit 1
          fi
      
      - name: Job Summary
        if: always()
        run: |
          echo "## Concert Ingestion Job Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Job ID**: ${{ vars.INGESTION_JOB_ID }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Job Type**: source_control_discovery_job" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered By**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY

