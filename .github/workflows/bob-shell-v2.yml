name: Bob Shell V2 - CVE Remediation with Approvals

on:
  issues:
    types: [opened, labeled]
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'GitHub Issue number for CVE remediation'
        required: false
        type: number
      skip_to_step:
        description: 'Skip to specific step (1=DevOps, 2=Approval Gate, 3=Unit Test, 4=Code Fix)'
        required: false
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
        default: '1'
      custom_prompt:
        description: 'Custom prompt for debugging (overrides default workflow)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

jobs:
  # ============================================================================
  # STEP 1: DevOps Concert Mode - Research CVE and Create PR
  # ============================================================================
  devops-cve-research:
    name: "1: DevOps - Research CVE & Create PR"
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.custom_prompt == '' &&
      ((github.event_name == 'issues' && (github.event.action == 'opened' || github.event.label.name == 'cve-remediation')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.skip_to_step == '1'))
    outputs:
      pr_number: ${{ steps.bob-devops.outputs.pr_number }}
      pr_branch: ${{ steps.bob-devops.outputs.pr_branch }}
      issue_number: ${{ steps.get-issue.outputs.issue_number }}
      false_positive_detected: ${{ steps.check-false-positive.outputs.false_positive_detected }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Get Issue Number
        id: get-issue
        run: |
          if [[ "${{ github.event_name }}" == "issues" ]]; then
            ISSUE_NUM="${{ github.event.issue.number }}"
          else
            ISSUE_NUM="${{ github.event.inputs.issue_number }}"
          fi
          echo "issue_number=${ISSUE_NUM}" >> $GITHUB_OUTPUT
          echo "📋 Processing Issue #${ISSUE_NUM}"
      
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Create Concert API Credentials File
        run: |
          cat > .env << EOF
          CONCERT_API_KEY="${{ secrets.CONCERT_API_KEY }}"
          CONCERT_HOSTNAME="${{ vars.CONCERT_HOSTNAME }}"
          CONCERT_INSTANCE_ID="${{ vars.CONCERT_INSTANCE_ID }}"
          EOF
          echo "✅ Concert API credentials configured"
      
      - name: Run Bob Shell - DevOps Concert Mode V2 (with False Positive Detection)
        id: bob-devops
        uses: ./.github/actions/bob-shell
        with:
          bobshell_api_key: ${{ secrets.BOBSHELL_API_KEY }}
          bobshell_debug: true
          mcp: ${{ secrets.BOBSHELL_MCP_CONFIG }}
          chat_mode: devops-concert-shell-v2
          prompt: |
            Process GitHub issue #${{ steps.get-issue.outputs.issue_number }} with false positive detection.
            
            Concert API credentials are available in the .env file in the repository root.
            
            Follow this workflow:
            1. Fetch the issue details from https://github.com/${{ github.repository }}/issues/${{ steps.get-issue.outputs.issue_number }}
            
            2. MANDATORY CVE Research - Cross-Reference Validation:
               a. Query Concert API first (source .env for credentials: CONCERT_API_KEY, CONCERT_HOSTNAME, CONCERT_INSTANCE_ID)
                  - GET /applications to find application ID
                  - GET /applications/{id}/vulnerability_details for CVE details
                  - GET /software_composition/recommendations?package_name={package} for Concert recommendation
               
               b. MANDATORY: Query NVD API for official CVE validation
                  - curl -X GET "https://services.nvd.nist.gov/rest/json/cves/2.0?cveId={CVE-ID}"
                  - Extract: CVE description, CVSS score, severity, CWE
                  - This is the PRIMARY external validation source
               
               c. FALLBACK ONLY: If NVD API fails or returns incomplete data, query GitHub Advisory Database API
                  - curl -X GET "https://api.github.com/advisories?cve_id={CVE-ID}" -H "Accept: application/vnd.github+json"
                  - Extract: Package name, vulnerable versions, patched versions
                  - Document that this was used as NVD fallback
               
               d. FALLBACK ONLY: If both NVD and GitHub Advisory fail, query OSV API
                  - curl -X POST "https://api.osv.dev/v1/query" with package/version data
                  - Document that this was used as fallback
               
               e. Validate consistency between Concert and external source (NVD preferred)
               f. Select final remediation version based on Concert + NVD validation
            
            3. FALSE POSITIVE DETECTION (NEW):
               a. Analyze source code to determine if CVE is a false positive
               b. Use search_files to find package imports and vulnerable function calls
               c. Read relevant files to understand usage patterns
               d. Assess if vulnerable code paths are reachable
               e. Consider deployment context and security controls
               f. Make determination: FALSE POSITIVE or TRUE POSITIVE
            
            4. IF FALSE POSITIVE:
               a. Create detailed comment on GitHub issue with analysis
               b. Include evidence: file paths, code snippets, reasoning
               c. Tag DevOps engineer for review
               d. Request they add 'false-positive' label if they agree
               e. Explain that labeling triggers Concert API update
               f. Do NOT create branch or PR
               g. Do NOT output pr_number, pr_branch, or pr_url
               h. Exit workflow - Bob has commented on the issue
            
            5. IF TRUE POSITIVE - Apply the package fix:
               a. Apply the package fix to the manifest files (requirements.txt, package.json, etc.)
               b. IMPORTANT: Consider transitive dependencies when upgrading packages
               c. For Python projects: Run 'pip install -r requirements.txt --dry-run' to verify all requirements can be met
            
            6. Create a branch following the naming convention: fix/cve-{CVE-ID}-{package-name}
            
            7. Commit the changes with a descriptive message
            
            8. Push the branch to origin
            
            9. Create a pull request following the EXACT format from .bob/rules-devops-concert/6_pr_formatting_and_documentation.xml:
               - PR Title: 🔒 Security Fix: CVE-{CVE-ID} - Upgrade {package} to {version}
               - PR Description MUST include ALL these sections:
                 * 🔒 Security Vulnerability Remediation
                 * 🔍 Vulnerability Analysis (CVE, Type, Severity, CVSS, CWE, Description, Attack Vector, Impact)
                 * 🔧 Changes Made (Package, From/To versions, File, Breaking Changes)
                 * 📋 Remediation Strategy (Research Sources with URLs, Fix Rationale, Alternative Approaches)
                 * 🎯 Concert API Analysis (Application, Recommendation, Risk Assessment)
                 * 📊 Impact Assessment (Security Impact, Functional Impact, Compatibility)
                 * ✅ Validation (Checklist including all API queries, pip install verification, transitive dependency checks)
                 * 📚 References (NVD URL, GitHub Advisory URL, Package Changelog, CWE URL, Concert Issue)
            
            CRITICAL REQUIREMENTS:
            - You MUST perform false positive detection before any package changes
            - You MUST query NVD API or GitHub Advisory API for every CVE - this is non-negotiable
            - You MUST follow the PR template format from 6_pr_formatting_and_documentation.xml exactly
            - Only update package manifest files. Do NOT modify application code or tests
            - If sources disagree, document the discrepancy and choose the safest version
            - If uncertain about false positive, default to TRUE POSITIVE (safer)

            10. Link the PR to GitHub issue #${{ steps.get-issue.outputs.issue_number }} without commenting on issue (TRUE POSITIVE only)
            
            IMPORTANT OUTPUT REQUIREMENTS:
            - For FALSE POSITIVE: Do NOT set pr_number, pr_branch, or pr_url outputs. Just comment on the issue and exit.
            - For TRUE POSITIVE: Set pr_number, pr_branch, and pr_url outputs as usual after creating the PR.
          settings: ${{ vars.BOBSHELL_SETTINGS }}
      
      - name: Check for False Positive Detection
        id: check-false-positive
        run: |
          # Check if Bob detected a false positive (no PR created)
          PR_NUMBER="${{ steps.bob-devops.outputs.pr_number }}"
          if [[ -z "$PR_NUMBER" || "$PR_NUMBER" == "null" ]]; then
            echo "false_positive_detected=true" >> $GITHUB_OUTPUT
            echo "⚠️ False positive detected - no PR was created"
          else
            echo "false_positive_detected=false" >> $GITHUB_OUTPUT
            echo "✅ True positive - PR #${PR_NUMBER} was created"
          fi
      
      - name: Add False Positive Approval Request Comment
        if: steps.check-false-positive.outputs.false_positive_detected == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = Number(`${{ steps.get-issue.outputs.issue_number }}`.trim());
            
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['false-positive-candidate', 'pending-devops-review']
            });
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `## 🔐 DevOps Approval Required - False Positive Confirmation
              
              Bob has analyzed this CVE and determined it is a **false positive**.
              
              **Next Steps:**
              1. DevOps Engineer: Review Bob's analysis above
              2. If you agree, approve the protected \`devops-approval\` environment in the workflow run
              3. This will update Concert API to mark the CVE as "False positive"
              
              **To approve the workflow:** Open the current workflow run and use the **Review deployments** approval for the \`devops-approval\` environment
              
              ⏸️ Workflow paused - waiting for environment approval
              
              Once approved, workflow will:
              - Update Concert API vulnerability assessment
              - Mark CVE as "False positive"
              - Close this issue`
            });
            
            core.info(`Added false-positive approval request to issue #${issueNumber}`);
      
      - name: Validate PR Creation
        if: steps.check-false-positive.outputs.false_positive_detected == 'false'
        id: validate-pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = `${{ steps.bob-devops.outputs.pr_number }}`.trim();
            const prBranch = `${{ steps.bob-devops.outputs.pr_branch }}`.trim();
            const prUrl = `${{ steps.bob-devops.outputs.pr_url }}`.trim();

            // Verify PR exists via GitHub API
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number(prNumber),
            });

            core.info(`✅ Validated PR #${pr.number}`);
            core.info(`   Branch: ${prBranch || pr.head.ref}`);
            core.info(`   URL: ${prUrl || pr.html_url}`);
      
      - name: Add Approval Request Comment
        if: steps.check-false-positive.outputs.false_positive_detected == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = ${{ steps.bob-devops.outputs.pr_number }};
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `## 🔐 DevOps Approval Required
              
              This PR contains package upgrades to fix a security vulnerability.
              
              **Next Steps:**
              1. DevOps Engineer: Review the package changes in this PR
              2. Approve the protected \`devops-approval\` environment in the workflow run
              
              **To approve the workflow:** Open the current workflow run and use the **Review deployments** approval for the \`devops-approval\` environment
              
              ⏸️ Workflow paused - waiting for environment approval
              
              Once approved, workflow run will proceed to:
              - Run unit tests
              - Fix any failing tests if needed
              - Request Software Lead review`
            });
      
      - name: Request DevOps Review
        if: steps.check-false-positive.outputs.false_positive_detected == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = ${{ steps.bob-devops.outputs.pr_number }};
            await github.rest.pulls.requestReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
              reviewers: ${{ vars.DEVOPS_REVIEWERS }}  // DevOps Team
            });
      
      - name: Add workflow metadata label
        if: steps.check-false-positive.outputs.false_positive_detected == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = ${{ steps.bob-devops.outputs.pr_number }};
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              labels: ['cve-remediation-workflow', 'pending-devops-review']
            });

  # ============================================================================
  # STEP 2A: False Positive Approval Gate & Concert Update
  # ============================================================================
  false-positive-approval-gate:
    name: "2A: False Positive - DevOps Approval & Concert Update"
    runs-on: ubuntu-latest
    needs: devops-cve-research
    if: |
      needs.devops-cve-research.result == 'success' &&
      needs.devops-cve-research.outputs.false_positive_detected == 'true'
    environment:
      name: devops-approval
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Extract CVE Info from Bob's Comment
        id: extract-info
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = Number(`${{ needs.devops-cve-research.outputs.issue_number }}`.trim());
            
            // Get issue details
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            });
            
            // Get all comments to find Bob's false positive analysis
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            });
            
            // Find Bob's false positive comment (contains "False Positive Detection")
            const bobComment = comments.find(c =>
              c.body.includes('🔍 False Positive Detection') ||
              c.body.includes('False Positive Analysis')
            );
            
            if (!bobComment) {
              core.setFailed('Could not find Bob\'s false positive analysis comment');
              return;
            }
            
            const commentBody = bobComment.body;
            
            // Extract all CVE IDs from the comment
            const cveMatches = [...commentBody.matchAll(/CVE[- ](\d{4})[- ](\d+)/gi)];
            const cveIds = [...new Set(cveMatches.map(m => `CVE-${m[1]}-${m[2]}`))];
            
            if (cveIds.length === 0) {
              core.setFailed('Could not extract any CVE IDs from Bob\'s comment');
              return;
            }
            
            // Extract package name from issue body
            const issueBody = issue.body || '';
            const packageMatch = issueBody.match(/\*\*Package\*\*:\s*`?([a-zA-Z0-9_-]+)`?/i);
            const packageName = packageMatch ? packageMatch[1] : 'unknown';
            
            // Extract application name from issue body
            const appMatch = issueBody.match(/\*\*Application\*\*:\s*([a-zA-Z0-9_-]+)/i);
            const applicationName = appMatch ? appMatch[1] : 'vulnerable-flask-app';
            
            core.info(`Extracted ${cveIds.length} CVE(s): ${cveIds.join(', ')}`);
            core.info(`Extracted Package: ${packageName}`);
            core.info(`Extracted Application: ${applicationName}`);
            
            // Output as JSON array for processing
            core.setOutput('cve_ids', JSON.stringify(cveIds));
            core.setOutput('cve_count', cveIds.length);
            core.setOutput('package_name', packageName);
            core.setOutput('application_name', applicationName);
            core.setOutput('issue_number', issueNumber);
            core.setOutput('issue_url', issue.html_url);
      
      - name: Query Concert API for Application ID
        id: get-app-id
        run: |
          echo "🔍 Querying Concert API for application ID..."
          
          CONCERT_API_KEY="${{ secrets.CONCERT_API_KEY }}"
          CONCERT_HOSTNAME="${{ vars.CONCERT_HOSTNAME }}"
          CONCERT_INSTANCE_ID="${{ vars.CONCERT_INSTANCE_ID }}"
          
          RESPONSE=$(curl -ksSL -X GET \
            -H "Authorization: ${CONCERT_API_KEY}" \
            -H "InstanceId: ${CONCERT_INSTANCE_ID}" \
            "${CONCERT_HOSTNAME}/concert/core/api/v1/applications")
          
          APP_NAME="${{ steps.extract-info.outputs.application_name }}"
          APP_ID=$(echo "${RESPONSE}" | jq -r ".[] | select(.name == \"${APP_NAME}\") | .id" | head -1)
          
          if [ -z "$APP_ID" ] || [ "$APP_ID" = "null" ]; then
            echo "⚠️ Could not find application '${APP_NAME}' in Concert"
            echo "app_id=unknown" >> $GITHUB_OUTPUT
          else
            echo "✅ Found application ID: ${APP_ID}"
            echo "app_id=${APP_ID}" >> $GITHUB_OUTPUT
          fi
      
      - name: Query Concert API for Vulnerability Details (All CVEs)
        id: get-vuln-details
        if: steps.get-app-id.outputs.app_id != 'unknown'
        run: |
          echo "🔍 Querying Concert API for vulnerability details..."
          
          CONCERT_API_KEY="${{ secrets.CONCERT_API_KEY }}"
          CONCERT_HOSTNAME="${{ vars.CONCERT_HOSTNAME }}"
          CONCERT_INSTANCE_ID="${{ vars.CONCERT_INSTANCE_ID }}"
          APP_ID="${{ steps.get-app-id.outputs.app_id }}"
          
          # Get all vulnerability details for the application
          RESPONSE=$(curl -ksSL -X GET \
            -H "Authorization: ${CONCERT_API_KEY}" \
            -H "InstanceId: ${CONCERT_INSTANCE_ID}" \
            "${CONCERT_HOSTNAME}/concert/core/api/v1/applications/${APP_ID}/vulnerability_details")
          
          # Parse CVE IDs from the extracted info
          CVE_IDS='${{ steps.extract-info.outputs.cve_ids }}'
          
          # Build JSON array of assessment objects
          ASSESSMENTS="[]"
          FOUND_COUNT=0
          MISSING_CVES=""
          
          for CVE_ID in $(echo "${CVE_IDS}" | jq -r '.[]'); do
            echo "Processing ${CVE_ID}..."
            
            FINDINGS_ID=$(echo "${RESPONSE}" | jq -r ".[] | select(.cve == \"${CVE_ID}\") | .findings_id" | head -1)
            ASSESSMENT_ID=$(echo "${RESPONSE}" | jq -r ".[] | select(.cve == \"${CVE_ID}\") | .assessment_id" | head -1)
            
            if [ -n "$FINDINGS_ID" ] && [ "$FINDINGS_ID" != "null" ]; then
              echo "✅ Found ${CVE_ID}: findings_id=${FINDINGS_ID}, assessment_id=${ASSESSMENT_ID}"
              
              # Add to assessments array
              ASSESSMENT_OBJ=$(jq -n \
                --arg findings_id "$FINDINGS_ID" \
                --arg assessment_id "$ASSESSMENT_ID" \
                --arg cve "$CVE_ID" \
                '{findings_id: $findings_id, assessment_id: $assessment_id, cve: $cve}')
              
              ASSESSMENTS=$(echo "${ASSESSMENTS}" | jq --argjson obj "$ASSESSMENT_OBJ" '. + [$obj]')
              FOUND_COUNT=$((FOUND_COUNT + 1))
            else
              echo "⚠️ Could not find ${CVE_ID} in Concert"
              MISSING_CVES="${MISSING_CVES}${CVE_ID} "
            fi
          done
          
          echo "assessments_json=${ASSESSMENTS}" >> $GITHUB_OUTPUT
          echo "found_count=${FOUND_COUNT}" >> $GITHUB_OUTPUT
          echo "missing_cves=${MISSING_CVES}" >> $GITHUB_OUTPUT
          
          if [ "$FOUND_COUNT" -eq 0 ]; then
            echo "❌ No CVEs found in Concert"
            echo "status=none_found" >> $GITHUB_OUTPUT
          else
            echo "✅ Found ${FOUND_COUNT} CVE(s) in Concert"
            echo "status=found" >> $GITHUB_OUTPUT
          fi
      
      - name: Update Concert Vulnerability Assessments (Batch)
        id: update-assessment
        if: |
          steps.get-app-id.outputs.app_id != 'unknown' &&
          steps.get-vuln-details.outputs.status == 'found'
        run: |
          echo "📝 Updating Concert vulnerability assessments to 'False positive'..."
          
          CONCERT_API_KEY="${{ secrets.CONCERT_API_KEY }}"
          CONCERT_HOSTNAME="${{ vars.CONCERT_HOSTNAME }}"
          CONCERT_INSTANCE_ID="${{ vars.CONCERT_INSTANCE_ID }}"
          
          APP_ID="${{ steps.get-app-id.outputs.app_id }}"
          ISSUE_URL="${{ steps.extract-info.outputs.issue_url }}"
          ASSESSMENTS_JSON='${{ steps.get-vuln-details.outputs.assessments_json }}'
          
          # Build the assessments array with full details
          ASSESSMENTS="[]"
          for row in $(echo "${ASSESSMENTS_JSON}" | jq -r '.[] | @base64'); do
            _jq() {
              echo "${row}" | base64 --decode | jq -r "${1}"
            }
            
            FINDINGS_ID=$(_jq '.findings_id')
            ASSESSMENT_ID=$(_jq '.assessment_id')
            CVE_ID=$(_jq '.cve')
            
            ASSESSMENT_OBJ=$(jq -n \
              --arg findings_id "$FINDINGS_ID" \
              --arg assessment_id "$ASSESSMENT_ID" \
              --arg status "False positive" \
              --arg app_id "$APP_ID" \
              --arg cve "$CVE_ID" \
              --arg comment "DevOps-approved false positive. Automated analysis by Bob. Package not used in application code. See ${ISSUE_URL}" \
              '{
                findings_id: $findings_id,
                assessment_id: $assessment_id,
                status: $status,
                application_id: $app_id,
                cve: $cve,
                comment: $comment
              }')
            
            ASSESSMENTS=$(echo "${ASSESSMENTS}" | jq --argjson obj "$ASSESSMENT_OBJ" '. + [$obj]')
          done
          
          PAYLOAD=$(jq -n --argjson assessments "$ASSESSMENTS" '{assessments: $assessments}')
          
          echo "Payload:"
          echo "${PAYLOAD}" | jq '.'
          
          RESPONSE=$(curl -ksSL -X PATCH \
            -H "Authorization: ${CONCERT_API_KEY}" \
            -H "InstanceId: ${CONCERT_INSTANCE_ID}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            "${CONCERT_HOSTNAME}/concert/ingestion/api/v1/vulnerability_assessments" \
            -d "${PAYLOAD}")
          
          echo "Response:"
          echo "${RESPONSE}" | jq '.' || echo "${RESPONSE}"
          
          # Count successful updates
          UPDATED_COUNT=$(echo "${ASSESSMENTS}" | jq 'length')
          echo "updated_count=${UPDATED_COUNT}" >> $GITHUB_OUTPUT
          
          if echo "${RESPONSE}" | jq -e '.success' > /dev/null 2>&1; then
            echo "✅ Successfully updated ${UPDATED_COUNT} Concert vulnerability assessment(s)"
            echo "status=success" >> $GITHUB_OUTPUT
          elif echo "${RESPONSE}" | jq -e '.error' > /dev/null 2>&1; then
            ERROR_MSG=$(echo "${RESPONSE}" | jq -r '.error')
            echo "❌ Concert API returned error: ${ERROR_MSG}"
            echo "status=error" >> $GITHUB_OUTPUT
            echo "error_message=${ERROR_MSG}" >> $GITHUB_OUTPUT
          else
            echo "✅ Concert API call completed for ${UPDATED_COUNT} CVE(s)"
            echo "status=completed" >> $GITHUB_OUTPUT
          fi
      
      - name: Post Success Comment and Close Issue
        if: steps.update-assessment.outputs.status == 'success' || steps.update-assessment.outputs.status == 'completed'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = ${{ steps.extract-info.outputs.issue_number }};
            const cveIds = JSON.parse('${{ steps.extract-info.outputs.cve_ids }}');
            const appId = '${{ steps.get-app-id.outputs.app_id }}';
            const updatedCount = '${{ steps.update-assessment.outputs.updated_count }}';
            const assessmentsJson = JSON.parse('${{ steps.get-vuln-details.outputs.assessments_json }}');
            const missingCves = '${{ steps.get-vuln-details.outputs.missing_cves }}'.trim();
            
            // Remove pending label
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                name: 'pending-devops-review'
              });
            } catch (e) {
              core.info(`Label may not exist: ${e.message}`);
            }
            
            // Build CVE details list
            let cveDetailsList = assessmentsJson.map(a =>
              `- **${a.cve}**: findings_id=${a.findings_id}, assessment_id=${a.assessment_id}`
            ).join('\n');
            
            let warningSection = '';
            if (missingCves) {
              warningSection = `\n### ⚠️ CVEs Not Found in Concert\nThe following CVEs were not found in Concert and were not updated:\n${missingCves.split(' ').filter(c => c).map(c => `- ${c}`).join('\n')}\n`;
            }
            
            // Add success comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `## ✅ DevOps Approval Received - Concert Updated
              
              ${updatedCount} vulnerability assessment(s) have been updated in Concert to **False positive**.
              
              ### Update Details
              - **Application ID**: ${appId}
              - **CVEs Updated**: ${updatedCount}
              - **Status**: False positive
              - **Updated**: ${new Date().toISOString()}
              
              ### CVE Details
              ${cveDetailsList}
              ${warningSection}
              ### Concert Dashboard
              You can verify these changes in the Concert dashboard under vulnerability assessments.
              
              This issue will now be closed as the false positive(s) have been confirmed and recorded.
              
              ---
              *Automated by bob-shell-v2 workflow*`
            });
            
            // Add labels
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['concert-updated', 'false-positive-confirmed']
            });
            
            // Close the issue
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed'
            });
      
      - name: Post Error Comment
        if: |
          steps.get-app-id.outputs.app_id == 'unknown' ||
          steps.get-vuln-details.outputs.status == 'none_found' ||
          steps.update-assessment.outputs.status == 'error'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = ${{ steps.extract-info.outputs.issue_number }};
            const cveIds = JSON.parse('${{ steps.extract-info.outputs.cve_ids }}');
            const appId = '${{ steps.get-app-id.outputs.app_id }}';
            const vulnStatus = '${{ steps.get-vuln-details.outputs.status }}';
            const errorMsg = '${{ steps.update-assessment.outputs.error_message }}';
            const missingCves = '${{ steps.get-vuln-details.outputs.missing_cves }}'.trim();
            
            let errorDetails = '';
            if (appId === 'unknown') {
              errorDetails = '- Could not find application in Concert API';
            } else if (vulnStatus === 'none_found') {
              errorDetails = `- Could not find any of the CVEs (${cveIds.join(', ')}) for application ${appId}`;
            } else if (errorMsg) {
              errorDetails = `- Concert API error: ${errorMsg}`;
            }
            
            let cveList = cveIds.map(c => `- ${c}`).join('\n');
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `## ⚠️ Concert API Update Failed
              
              DevOps approval was received, but Concert API update failed.
              
              ### Error Details
              ${errorDetails}
              
              ### CVEs to Update
              ${cveList}
              
              ### Manual Steps Required
              Please manually update the vulnerability assessments in Concert:
              1. Log into Concert dashboard
              2. Navigate to Vulnerability Assessments
              3. Find each CVE listed above
              4. Update status to "False positive"
              5. Add comment referencing this issue
              
              ### Debug Information
              - **CVE**: ${cveId}
              - **Application ID**: ${appId}
              - **Findings ID**: ${findingsId}
              
              ---
              *Automated by bob-shell-v2 workflow*`
            });
            
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['concert-update-failed', 'needs-manual-update']
            });

  # ============================================================================
  # STEP 2B: True Positive - DevOps Environment Approval Gate
  # ============================================================================
  devops-approval-gate:
    name: "2B: True Positive - Pause for DevOps Approval"
    runs-on: ubuntu-latest
    needs: devops-cve-research
    if: |
      (needs.devops-cve-research.result == 'success' &&
       needs.devops-cve-research.outputs.false_positive_detected != 'true') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.skip_to_step == '2')
    environment:
      name: devops-approval
    outputs:
      pr_number: ${{ needs.devops-cve-research.outputs.pr_number }}
      pr_branch: ${{ needs.devops-cve-research.outputs.pr_branch }}
    
    steps:
      - name: Mark Approval Received
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = Number(`${{ needs.devops-cve-research.outputs.pr_number }}`.trim());
            
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                name: 'pending-devops-review'
              });
            } catch (e) {
              core.info(`Label may not exist: ${e.message}`);
            }
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `## ✅ DevOps Environment Approval Received!
              
              🧪 Running the unit tests now...`
            });

  # ============================================================================
  # STEP 3: Run Unit Tests After DevOps Approval
  # ============================================================================
  run-unit-tests-after-approval:
    name: "3: Run Unit Tests"
    runs-on: ubuntu-latest
    needs: devops-approval-gate
    if: |
      (needs.devops-approval-gate.result == 'success') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.skip_to_step == '3')
    outputs:
      tests_passed: ${{ steps.run-tests.outputs.tests_passed }}
      pr_number: ${{ needs.devops-approval-gate.outputs.pr_number }}
      pr_branch: ${{ needs.devops-approval-gate.outputs.pr_branch }}
    
    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.devops-approval-gate.outputs.pr_branch }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        id: install-deps
        working-directory: app/vulnerable
        run: pip install -r requirements.txt
        continue-on-error: true
      
      - name: Run unit tests
        id: run-tests
        working-directory: app/vulnerable
        run: |
          set +e
          python -m unittest test_main.py -v
          TEST_EXIT_CODE=$?
          set -e
          
          if [[ $TEST_EXIT_CODE -eq 0 ]]; then
            echo "tests_passed=true" >> $GITHUB_OUTPUT
          else
            echo "tests_passed=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true
      
      - name: Report Test Results
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = Number(`${{ needs.devops-approval-gate.outputs.pr_number }}`.trim());
            const testsPassed = '${{ steps.run-tests.outputs.tests_passed }}' === 'true';
            
            if (testsPassed) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: ['pending-code-review']
              });
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `## ✅ Unit Tests Passed!
                
                All unit tests passed successfully after the package upgrade.
                
                Ready for Software Lead review and approval for merge.`
              });
              
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                reviewers: ${{ vars.LEAD_REVIEWERS }}
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `## ❌ Unit Tests Failed
                
                The unit tests failed after the package upgrade. Code changes are needed.
                
                ⏳ Starting Bob code remediation...`
              });
            }

  # ============================================================================
  # STEP 4: Fix Failing Tests (if needed)
  # ============================================================================
  fix-failing-tests:
    name: "4: Fix Failing Unit Tests"
    runs-on: ubuntu-latest
    needs: run-unit-tests-after-approval
    if: |
      always() &&
      ((needs.run-unit-tests-after-approval.result == 'success' &&
        needs.run-unit-tests-after-approval.outputs.tests_passed == 'false') ||
       (github.event_name == 'workflow_dispatch' && github.event.inputs.skip_to_step == '4'))
    
    steps:
      - name: Checkout PR Branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.run-unit-tests-after-approval.outputs.pr_branch }}
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Run Bob Shell - Vuln Remediation Mode
        id: bob-remediation
        uses: ./.github/actions/bob-shell
        with:
          bobshell_api_key: ${{ secrets.BOBSHELL_API_KEY }}
          bobshell_debug: true
          mcp: ${{ secrets.BOBSHELL_MCP_CONFIG }}
          chat_mode: advanced
          prompt: |
            Fix the failing unit tests in PR #${{ needs.run-unit-tests-after-approval.outputs.pr_number }}.
            
            Follow this workflow:
            1. Analyze the PR at https://github.com/${{ github.repository }}/pull/${{ needs.run-unit-tests-after-approval.outputs.pr_number }}
            2. Understand what package was upgraded and why tests are failing
            3. Run the unit tests locally to see the exact failures
            4. Fix the code to work with the upgraded package
            5. Verify all tests pass
            6. Commit your fixes to the EXISTING PR branch: ${{ needs.run-unit-tests-after-approval.outputs.pr_branch }}
            7. Push the changes
            8. Add a comment to the PR documenting what was fixed
            
            CRITICAL: Commit to branch "${{ needs.run-unit-tests-after-approval.outputs.pr_branch }}" - do NOT create a new branch!
          settings: ${{ vars.BOBSHELL_SETTINGS }}
      
      - name: Pull Latest Changes from PR Branch
        run: |
          git pull origin ${{ needs.run-unit-tests-after-approval.outputs.pr_branch }}
          echo "✅ Pulled latest changes from PR branch"
      
      - name: Verify Tests Now Pass
        id: verify-tests
        working-directory: app/vulnerable
        run: |
          pip install -r requirements.txt
          python -m unittest test_main.py -v
        continue-on-error: true
      
      - name: Report Remediation Results
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = Number(`${{ needs.run-unit-tests-after-approval.outputs.pr_number }}`.trim());
            const testsNowPass = '${{ steps.verify-tests.outcome }}' === 'success';
            
            if (testsNowPass) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: ['pending-code-review']
              });
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `## ✅ Code Remediation Complete!
                
                Bob has successfully fixed the failing unit tests. All tests now pass.
                
                Ready for Software Lead review and approval for merge.`
              });
              
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                reviewers: ${{ vars.LEAD_REVIEWERS }}
              });
            } else {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: ['needs-manual-fix']
              });
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `## ⚠️ Additional Fixes May Be Needed
                
                Bob attempted to fix the failing tests, but some tests may still be failing.
                Manual intervention may be required.
                
                Please review the changes and continue the remediation.`
              });
              
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                assignees: ${{ vars.SWE_REVIEWERS }}
              });
            }

  # ============================================================================
  # DEBUG JOB: Custom Prompt for Debugging
  # ============================================================================
  debug-custom-prompt:
    name: "Debug: Custom Prompt"
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.custom_prompt != ''
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Create Concert API Credentials File
        run: |
          cat > .env << EOF
          CONCERT_API_KEY="${{ secrets.CONCERT_API_KEY }}"
          CONCERT_HOSTNAME="${{ secrets.CONCERT_HOSTNAME }}"
          CONCERT_INSTANCE_ID="${{ secrets.CONCERT_INSTANCE_ID }}"
          EOF
          echo "✅ Concert API credentials configured"
      
      - name: Run Bob Shell with Custom Prompt
        id: bob-debug
        uses: ./.github/actions/bob-shell
        with:
          bobshell_api_key: ${{ secrets.BOBSHELL_API_KEY }}
          bobshell_debug: true
          mcp: ${{ secrets.BOBSHELL_MCP_CONFIG }}
          prompt: ${{ github.event.inputs.custom_prompt }}
          settings: ${{ vars.BOBSHELL_SETTINGS }}
      
      - name: Display Results
        run: |
          echo "## Bob Shell Debug Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Custom Prompt Used:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ github.event.inputs.custom_prompt }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Bob Shell Response:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.bob-debug.outputs.summary }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
